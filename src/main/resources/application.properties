# ===== APLICACIÓN =====
spring.application.name=kontein
server.port=8080

# ===== POSTGRESQL =====
spring.datasource.url=jdbc:postgresql://localhost:5432/kontein
spring.datasource.username=kontein_user
spring.datasource.password=kontein_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===== JWT =====
jwt.secret=kontein-secret-key-development-only-change-in-production
jwt.expiration=86400000

# ===== DOCKER =====
docker.host=unix:///var/run/docker.sock